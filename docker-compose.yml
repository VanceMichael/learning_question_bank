version: '3.8'

services:
  mysql:
    image: mysql:8.0
    platform: linux/amd64
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: question_bank
      LANG: C.UTF-8
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8083:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root123
      JWT_SECRET: qbank2026SecretKeyForJwtTokenGenerationMustBeLongEnough
    depends_on:
      mysql:
        condition: service_healthy

  frontend-user:
    build: ./frontend-user
    ports:
      - "8081:80"
    depends_on:
      - backend

  frontend-admin:
    build: ./frontend-admin
    ports:
      - "8082:80"
    depends_on:
      - backend

volumes:
  mysql_data:
